<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h1>kWh Classifier</h1>

        <input type="text" class="form-control" id="kWh" placeholder="type here..">
        <button class="btn btn-info" onclick="checkkWh()">Check</button>
    


    <script>
        function checkkWh(){

            var kWh = document.getElementById("kWh").value;
            Let cat1 = "Lifeline Consumer" ;
                if(isNaN(kWh) || kWh<0){
                    alert("input valid number");
        }
        else if (kWh<= 100){
            alert(cat1 + "You have discounted electricity rates");
        }
        else if (kWh>500){
            alert("Very high consumption");
        }
        else if{
            alert("Age could not be classified");
        }
    }

    </script>
</body>
