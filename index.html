<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kWh Classifier</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h1>kWh Classifier</h1>

<input type="text" class="form-control" id="kWh" placeholder="Enter kWh usage">
<br>

<button class="btn btn-info" onclick="checkkWh()">Check</button>

<script>

function checkkWh(){

    let kWh = Number(document.getElementById("kWh").value);

    if(isNaN(kWh) || kWh < 0){
        alert("Please enter a valid number");
    }

    else if(kWh <= 100){
        alert("Lifeline Consumer: Discounted electricity rates");
    }

    else if(kWh <= 200){
        alert("Low Consumption: Normal residential rate");
    }

    else if(kWh <= 300){
        alert("Average Consumption: Typical electricity usage");
    }

    else if(kWh <= 500){
        alert("High Consumption: Higher electricity usage");
    }

    else{
        alert("Very High Consumption: Heavy electricity users");
    }

}

</script>

</body>
</html>
